; ===========================================================================
; models.ini — the ONE place a model lives. Parsed by scripts/ini.sh; sourced
; indirectly by prefetch.sh, run-bench.sh and run-quality.sh.
;
; FORMAT
;   [*]        shared defaults, applied to every profile (per-profile keys win)
;   [label]    one section per model; the section name is the label used in
;              CSV rows, quality/<label>/ output dirs, and ./models symlinks
;
; RESERVED KEYS (interpreted by the scripts, never passed through as flags)
;   hf        = repo:quant        REQUIRED. Resolved via llama.cpp's -hf
;                                 downloader — never a local path; the shared
;                                 cache layout across all three scripts
;                                 depends on it.
;   type      = dense | moe       REQUIRED. type=moe is the only thing that
;                                 triggers --n-cpu-moe (see n-cpu-moe below).
;   sys       = <string>          Optional system prompt (quality pass only).
;                                 Unset/empty ⇒ no system message sent.
;   template  = <path>            Optional chat template .jinja, relative to
;                                 the repo root (quality pass only). Unset ⇒
;                                 model's built-in template.
;
; PASS-THROUGH KEYS (everything else)
;   key = value   →  appended verbatim to the llama command line. Keys in
;   ini.sh's SHORT_FLAGS list get ONE dash (-ngl, -fa, -ctk ...), all others
;   get TWO (--n-cpu-moe, --temp ...) — llama.cpp's parsers match option
;   strings exactly, so the dash count matters.
;   Values on/off pass through (llama.cpp accepts them, e.g. fa = on).
;   An EMPTY value skips the key entirely. 0 is NOT skipped — 0 is meaningful
;   (ngl = 0 is a real setting). This intentionally diverges from launchers
;   that drop zero-valued keys.
;
; SCOPING (which script applies a key)
;   key           = ...   both llama-bench (run-bench.sh) and llama-server
;                         (run-quality.sh)
;   bench.key     = ...   run-bench.sh only
;   quality.key   = ...   run-quality.sh only
;   prefetch.sh uses only `hf`; it ignores all flags.
;
; Comments: full-line `;` or `#`. Inline comments are NOT stripped — keep
; reasoning on its own line above the key it explains.
; ===========================================================================

; [*] also accepts the reserved keys `sys` and `template` as global fallbacks —
; they replace the old SYS_DEFAULT / CHAT_TEMPLATE variables. Leave unset for
; no system message / each model's built-in template.
[*]
type = dense
; KV cache quant: q8_0 halves KV vs f16 with negligible quality cost.
ctk = q8_0
ctv = q8_0
fa = on
; physical cores (7800X3D: 8). Expert offload is DDR5-bandwidth-bound,
; not cache-bound, so 3D V-cache doesn't change this number.
t = 8
ngl = 99
; MoE expert offload: 99 = ALL expert layers in RAM, attention on GPU.
; Lower per-profile to pull experts back onto the GPU until VRAM ~fills.
; Applied only when type = moe; dense profiles never see it.
n-cpu-moe = 99
; Context size for the quality pass (llama-bench doesn't take -c; it uses -d).
; Matches the previous hardcoded server value. Raise per-model if a task needs it.
quality.c = 8192

; ---------------------------------------------------------------------------
; Worked example: Qwen3.6 (migrated from the old CONFIGS pipe lines).
; Ships commented out — the bundle is model-neutral. Uncomment to reproduce
; the reference numbers in model-benches/qwen36.md.
; ---------------------------------------------------------------------------

; Qwen3.6-27B dense, IQ4_XS — daily-driver dense candidate. Fully on GPU.
; Stock chat template mangles tool-call XML; froggeric v20 fixes it.
;[qwen36-27b-iq4xs]
;hf = unsloth/Qwen3.6-27B-GGUF:IQ4_XS
;type = dense
;sys = You are Qwen, created by Alibaba Cloud. You are a helpful assistant.
;template = templates/qwen36-froggeric-v20.jinja

; Qwen3.6-35B-A3B MoE, UD-IQ4_NL_XL — "A3B" is compute per token, not memory:
; ~20-22 GB of expert weights must stay resident, so experts park in RAM via
; n-cpu-moe (inherited from [*]). Real ceiling is system RAM, not VRAM.
;[qwen36-35b-a3b-ud-iq4nlxl]
;hf = unsloth/Qwen3.6-35B-A3B-GGUF:UD-IQ4_NL_XL
;type = moe
;sys = You are Qwen, created by Alibaba Cloud. You are a helpful assistant.
;template = templates/qwen36-froggeric-v20.jinja
; MoE prefill is batch-sensitive; raise ub if PP-bound.
;quality.b = 2048
;quality.ub = 512
